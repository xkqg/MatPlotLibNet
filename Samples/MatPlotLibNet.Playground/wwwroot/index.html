<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MatPlotLibNet Playground</title>
    <base href="/MatPlotLibNet/playground/" />
    <style>
        :root {
            --bg: #1e1e2e;
            --surface: #282a36;
            --border: #44475a;
            --text: #f8f8f2;
            --muted: #6272a4;
            --accent: #8be9fd;
            --green: #50fa7b;
            --pink: #ff79c6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

        .playground-app header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border);
        }
        .playground-app header h1 { font-size: 1.2rem; color: var(--accent); }
        .playground-app header nav a {
            color: var(--muted); text-decoration: none; margin-left: 16px; font-size: 0.9rem;
        }
        .playground-app header nav a:hover { color: var(--text); }

        .playground-app main { padding: 0; }

        .playground-layout {
            display: grid; grid-template-columns: 1fr 1fr; gap: 0;
            height: calc(100vh - 52px);
        }
        @media (max-width: 900px) {
            .playground-layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
        }

        .panel { padding: 16px; overflow: auto; }
        .panel-controls { background: var(--surface); border-right: 1px solid var(--border); }
        .panel-preview { background: var(--bg); display: flex; flex-direction: column; }

        .example-select {
            width: 100%; padding: 8px 12px; margin-bottom: 16px;
            background: var(--bg); color: var(--text); border: 1px solid var(--border);
            border-radius: 4px; font-size: 0.95rem;
        }

        .param-group { margin-bottom: 12px; }
        .param-group label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; }
        .param-group input, .param-group select {
            width: 100%; padding: 6px 10px;
            background: var(--bg); color: var(--text); border: 1px solid var(--border);
            border-radius: 4px; font-size: 0.9rem;
        }
        .param-group input[type="color"] { height: 36px; padding: 2px; cursor: pointer; }
        .param-group input[type="range"] { padding: 0; }
        .param-group input[type="checkbox"] { width: auto; margin-right: 6px; accent-color: var(--accent); }
        .param-group label:has(input[type="checkbox"]) { display: flex; align-items: center; font-size: 0.9rem; color: var(--text); cursor: pointer; }
        .example-select optgroup { color: var(--muted); font-style: normal; }
        .example-select option { color: var(--text); }

        .code-block {
            position: relative; margin-top: 16px;
            background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
            padding: 12px; font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 0.8rem; line-height: 1.5; overflow-x: auto; white-space: pre;
            color: var(--green); max-height: 300px; overflow-y: auto;
        }
        .copy-btn {
            position: absolute; top: 6px; right: 6px;
            background: var(--border); color: var(--text); border: none;
            border-radius: 3px; padding: 4px 10px; font-size: 0.75rem; cursor: pointer;
        }
        .copy-btn:hover { background: var(--muted); }

        .chart-toolbar {
            display: flex; gap: 8px; padding: 6px 12px; background: var(--surface);
            border-radius: 6px 6px 0 0; margin: 8px 8px 0 8px;
        }
        .chart-toolbar button {
            background: var(--border); color: var(--text); border: none;
            border-radius: 3px; padding: 6px 12px; font-size: 0.8rem; cursor: pointer;
            display: inline-flex; align-items: center; gap: 4px;
        }
        .chart-toolbar button:hover { background: var(--muted); color: var(--bg); }
        .chart-toolbar button.primary { background: var(--accent); color: var(--bg); font-weight: 600; }
        .chart-toolbar button.primary:hover { background: #6cdcf0; }

        .chart-preview {
            flex: 1; display: flex; align-items: center; justify-content: center;
            background: white; border-radius: 0 0 6px 6px; margin: 0 8px 8px 8px; min-height: 400px;
        }
        .chart-preview :deep(svg) { max-width: 100%; max-height: 100%; }

        .section-title { font-size: 0.9rem; color: var(--pink); margin: 16px 0 8px; }
        .hint { font-size: 0.75rem; color: var(--muted); margin-top: 4px; font-style: italic; }

        #app { min-height: 100vh; }
        .loading { display: flex; align-items: center; justify-content: center; height: 100vh; color: var(--muted); }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading">Loading MatPlotLibNet Playground...</div>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        // ── Clipboard ──────────────────────────────────────────────────────
        window.copyToClipboard = function(text) {
            navigator.clipboard.writeText(text);
        };

        // ── Download a string as a file (used for SVG / .cs code) ──────────
        // Creates an in-memory Blob, generates an object-URL, programmatically
        // clicks an anchor with download=, then revokes the URL.
        window.downloadFile = function(content, fileName, mimeType) {
            const blob = new Blob([content], { type: mimeType || 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = fileName;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        };

        // ── Open SVG in a new tab so the user can zoom/pan natively ────────
        // Browser-interactive SVGs include embedded JS for pan/zoom/tooltips —
        // opening them standalone gives the user the real "feel" of the chart.
        window.openInNewTab = function(svgContent) {
            const blob = new Blob([svgContent], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            window.open(url, '_blank', 'noopener');
            // Don't revoke immediately — the new tab needs to load first.
            setTimeout(() => URL.revokeObjectURL(url), 60_000);
        };

        // ── PNG export — rasterize the current SVG via canvas ──────────────
        // Works fully client-side: load SVG into Image, draw onto canvas at the
        // SVG's intrinsic size (or fall back to 800x600), then toBlob → download.
        window.downloadPng = function(svgContent, fileName) {
            const blob = new Blob([svgContent], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                canvas.width  = img.naturalWidth  || 800;
                canvas.height = img.naturalHeight || 600;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                URL.revokeObjectURL(url);
                canvas.toBlob(function(pngBlob) {
                    const pngUrl = URL.createObjectURL(pngBlob);
                    const a = document.createElement('a');
                    a.href = pngUrl; a.download = fileName;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                    setTimeout(() => URL.revokeObjectURL(pngUrl), 1000);
                }, 'image/png');
            };
            img.onerror = function() {
                URL.revokeObjectURL(url);
                console.error('Failed to load SVG for PNG conversion');
            };
            img.src = url;
        };
    </script>
</body>
</html>
