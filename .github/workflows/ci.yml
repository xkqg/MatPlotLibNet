name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt all JS-based actions into Node.js 24 ahead of GitHub's Sept 2026 forced
# migration. Setting this now means we discover any incompatibility today (when
# we can fix it) instead of when the runner switches automatically.
# See https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install Skia native deps
        # SkiaSharp 3.x on Linux needs libfontconfig1 + libfreetype6 — without them
        # `libSkiaSharp.so: cannot open shared library` blows up the Skia tests + any
        # PNG/PDF/GIF render path. Installing here (before any Skia-touching step) so
        # both build-and-test and the coverage job inherit working native libs.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libfontconfig1 libfreetype6

      - name: Restore
        run: dotnet restore MatPlotLibNet.CI.slnf

      - name: Build
        run: dotnet build MatPlotLibNet.CI.slnf --no-restore --configuration Release

      - name: Test
        run: |
          dotnet run --project Tst/MatPlotLibNet/MatPlotLibNet.Tests.csproj --no-build --configuration Release
          dotnet run --project Tst/MatPlotLibNet.Geo/MatPlotLibNet.Geo.Tests.csproj --no-build --configuration Release
          # Skia tests added here so cross-platform native-lib breakage surfaces in
          # the FIRST CI job, not only in the coverage job. Previously discovered
          # too late because Skia was only run via the coverage measurement.
          dotnet run --project Tst/MatPlotLibNet.Skia/MatPlotLibNet.Skia.Tests.csproj --no-build --configuration Release
          dotnet run --project Tst/MatPlotLibNet.Blazor/MatPlotLibNet.Blazor.Tests.csproj --no-build --configuration Release
          dotnet run --project Tst/MatPlotLibNet.Avalonia/MatPlotLibNet.Avalonia.Tests.csproj --no-build --configuration Release
          dotnet run --project Tst/MatPlotLibNet.AspNetCore/MatPlotLibNet.AspNetCore.Tests.csproj --no-build --configuration Release
          dotnet run --project Tst/MatPlotLibNet.Interactive/MatPlotLibNet.Interactive.Tests.csproj --no-build --configuration Release
          dotnet run --project Tst/MatPlotLibNet.GraphQL/MatPlotLibNet.GraphQL.Tests.csproj --no-build --configuration Release

  coverage:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Setup PowerShell
        run: |
          # Linux runners include pwsh by default; this ensures consistency
          pwsh --version

      - name: Install Skia native deps
        run: |
          # SkiaSharp 3.x on Linux needs native libs that aren't on default Ubuntu
          # runners. Skia tests crash with `libSkiaSharp.so: cannot open shared
          # library` without these. Mirrors what the SkiaSharp NuGet docs prescribe
          # for headless server scenarios.
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libfontconfig1 libfreetype6

      - name: Install coverage tools
        run: |
          # dotnet-coverage is Microsoft's official cross-platform coverage collector
          # for the Microsoft Testing Platform that xUnit v3 runs on. Replaced
          # coverlet.console after its 10.0.0 release (2026-04-17) silently captured
          # zero coverage on Ubuntu runners — see tools/coverage/run.sh header.
          dotnet tool install --global dotnet-coverage
          dotnet tool install --global dotnet-reportgenerator-globaltool
          # Make global tools visible
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Run coverage + threshold gate
        run: |
          # Builds, collects, merges, then check-thresholds.ps1 --strict fails the
          # job if any class is below 90/90 absolute thresholds or regressed vs baseline.
          chmod +x tools/coverage/run.sh
          bash tools/coverage/run.sh --check --strict

      - name: Upload coverage report (on failure)
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: out/coverage/
          retention-days: 14

  nuget-publish:
    runs-on: ubuntu-latest
    needs: [build-and-test, coverage]
    # Only publish on direct pushes to main, not on PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore MatPlotLibNet.CI.slnf

      - name: Build
        run: dotnet build MatPlotLibNet.CI.slnf --configuration Release --no-restore

      - name: Pack
        run: |
          dotnet pack Src/MatPlotLibNet/MatPlotLibNet.csproj \
            --no-build --no-restore --configuration Release \
            --output out/nupkg
          dotnet pack Src/MatPlotLibNet.Skia/MatPlotLibNet.Skia.csproj \
            --no-build --no-restore --configuration Release \
            --output out/nupkg
          dotnet pack Src/MatPlotLibNet.Blazor/MatPlotLibNet.Blazor.csproj \
            --no-build --no-restore --configuration Release \
            --output out/nupkg
          dotnet pack Src/MatPlotLibNet.AspNetCore/MatPlotLibNet.AspNetCore.csproj \
            --no-build --no-restore --configuration Release \
            --output out/nupkg
          dotnet pack Src/MatPlotLibNet.Interactive/MatPlotLibNet.Interactive.csproj \
            --no-build --no-restore --configuration Release \
            --output out/nupkg
          dotnet pack Src/MatPlotLibNet.Geo/MatPlotLibNet.Geo.csproj \
            --no-build --no-restore --configuration Release \
            --output out/nupkg
          dotnet pack Src/MatPlotLibNet.Avalonia/MatPlotLibNet.Avalonia.csproj \
            --no-build --no-restore --configuration Release \
            --output out/nupkg
          dotnet pack Src/MatPlotLibNet.Wpf/MatPlotLibNet.Wpf.csproj \
            --no-build --no-restore --configuration Release \
            --output out/nupkg
          dotnet pack Src/MatPlotLibNet.Maui/MatPlotLibNet.Maui.csproj \
            --no-build --no-restore --configuration Release \
            --output out/nupkg
          dotnet pack Src/MatPlotLibNet.Uno/MatPlotLibNet.Uno.csproj \
            --no-build --no-restore --configuration Release \
            --output out/nupkg
          dotnet pack Src/MatPlotLibNet.DataFrame/MatPlotLibNet.DataFrame.csproj \
            --no-build --no-restore --configuration Release \
            --output out/nupkg
          dotnet pack Src/MatPlotLibNet.Notebooks/MatPlotLibNet.Notebooks.csproj \
            --no-build --no-restore --configuration Release \
            --output out/nupkg
          dotnet pack Src/MatPlotLibNet.GraphQL/MatPlotLibNet.GraphQL.csproj \
            --no-build --no-restore --configuration Release \
            --output out/nupkg

      - name: Push to NuGet
        run: |
          dotnet nuget push out/nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
