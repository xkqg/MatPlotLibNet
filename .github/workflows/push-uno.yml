name: Push Uno NuGet Package

# Triggered automatically on every published GitHub Release (same hook as publish.yml
# uses for the other 12 packages) so Uno cannot fall behind the version tag again.
# workflow_dispatch is also kept so it can be re-run manually if a release fails.
#
# Why a separate workflow at all? Uno requires the Uno SDK source generators
# (SKCanvasElement etc.) which are not part of any dotnet workload — they install
# via Uno.Templates. So this job has its own Setup steps + cannot be merged into
# publish.yml's matrix. See publish.yml comment lines 64-68.
on:
  release:
    types: [published]
  workflow_dispatch:

# Opt JS actions into Node 24 ahead of the Sept 2026 forced migration.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Install Uno templates
        run: dotnet new install Uno.Templates

      - name: Restore
        run: dotnet restore Src/MatPlotLibNet.Uno/MatPlotLibNet.Uno.csproj

      - name: Build
        run: dotnet build Src/MatPlotLibNet.Uno/MatPlotLibNet.Uno.csproj --no-restore -c Release

      - name: Pack
        run: dotnet pack Src/MatPlotLibNet.Uno/MatPlotLibNet.Uno.csproj -c Release -o nupkgs

      - name: Push to NuGet
        run: dotnet nuget push "nupkgs/MatPlotLibNet.Uno.*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
