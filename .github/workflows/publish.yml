name: Publish to NuGet

on:
  release:
    types: [published]

jobs:
  publish-core:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore MatPlotLibNet.CI.slnf

      - name: Build
        run: dotnet build MatPlotLibNet.CI.slnf --no-restore --configuration Release

      - name: Test
        run: |
          dotnet run --project Tst/MatPlotLibNet/MatPlotLibNet.Tests.csproj --no-build --configuration Release
          dotnet run --project Tst/MatPlotLibNet.Blazor/MatPlotLibNet.Blazor.Tests.csproj --no-build --configuration Release
          dotnet run --project Tst/MatPlotLibNet.AspNetCore/MatPlotLibNet.AspNetCore.Tests.csproj --no-build --configuration Release
          dotnet run --project Tst/MatPlotLibNet.Interactive/MatPlotLibNet.Interactive.Tests.csproj --no-build --configuration Release
          dotnet run --project Tst/MatPlotLibNet.GraphQL/MatPlotLibNet.GraphQL.Tests.csproj --no-build --configuration Release

      - name: Pack
        run: dotnet pack MatPlotLibNet.CI.slnf --no-build --configuration Release --output nupkgs

      - name: Push to NuGet
        run: dotnet nuget push "nupkgs/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

  publish-platform:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Build Skia
        run: dotnet build Src/MatPlotLibNet.Skia/MatPlotLibNet.Skia.csproj --configuration Release

      - name: Build MAUI
        run: dotnet build Src/MatPlotLibNet.Maui/MatPlotLibNet.Maui.csproj --configuration Release

      - name: Pack Skia
        run: dotnet pack Src/MatPlotLibNet.Skia/MatPlotLibNet.Skia.csproj --no-build --configuration Release --output nupkgs

      - name: Pack MAUI
        run: dotnet pack Src/MatPlotLibNet.Maui/MatPlotLibNet.Maui.csproj --no-build --configuration Release --output nupkgs

      - name: Push to NuGet
        run: |
          foreach ($pkg in Get-ChildItem nupkgs/*.nupkg) {
            dotnet nuget push $pkg.FullName --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          }
