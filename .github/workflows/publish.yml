name: Publish to NuGet

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore MatPlotLibNet.CI.slnf

      - name: Build
        run: dotnet build MatPlotLibNet.CI.slnf --no-restore --configuration Release

      - name: Test
        run: dotnet test MatPlotLibNet.CI.slnf --no-build --configuration Release --verbosity normal

      - name: Pack
        run: dotnet pack MatPlotLibNet.CI.slnf --no-build --configuration Release --output nupkgs

      - name: Push to NuGet
        run: dotnet nuget push "nupkgs/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
