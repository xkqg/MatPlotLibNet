title: "[Idea] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for a new chart type, API improvement, or integration? We'd love to hear it!
        Check the [roadmap](https://github.com/xkqg/MatPlotLibNet/wiki/Roadmap) first to see what's planned.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: How would you use this feature? What problem does it solve?
  - type: textarea
    id: examples
    attributes:
      label: Examples or references (optional)
      description: Links to similar features in matplotlib, other libraries, or mockups.
